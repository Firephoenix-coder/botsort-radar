<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Орбітальний Радар (Гібридний Движок)</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace;}
        #globeViz { height: 100vh; width: 100vw; cursor: grab; }
        
        #close-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; background: rgba(0, 0, 0, 0.8); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status-panel { position: absolute; top: 15px; left: 15px; z-index: 9999; background: rgba(0, 20, 40, 0.8); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; border-radius: 5px; font-size: 14px; font-weight: bold; pointer-events: none; text-shadow: 0 0 5px #00ffcc; }
        
        #mode-toggle { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 5px; background: rgba(0,20,40,0.8); padding: 5px; border-radius: 10px; border: 1px solid #00ffcc; width: 90%; max-width: 400px; justify-content: center;}
        .mode-btn { flex: 1; padding: 10px 5px; font-size: 14px; font-weight: bold; cursor: pointer; border: 1px solid transparent; border-radius: 5px; background: #001122; color: #00ffcc; transition: 0.3s; text-align: center;}
        .mode-btn.active { background: #00ffcc; color: #000; box-shadow: 0 0 10px #00ffcc; }

        /* Стандартний тултип для WebGL та Орбіт */
        .scene-tooltip {
            background: rgba(0, 15, 30, 0.95) !important; border: 1px solid #00ffcc !important; border-radius: 8px !important;
            padding: 12px !important; color: #fff !important; font-family: 'Arial', sans-serif !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4) !important; pointer-events: none; min-width: 200px;
        }
        .sat-name { color: #00ffcc; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between;}
        .sat-org { font-size: 11px; color: #ffaa00; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .sat-data { font-size: 13px; color: #ccc; }
        .sat-data span { color: #fff; font-weight: bold; }
        .orbit-info { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.4; font-style: italic;}

        /* НОВИЙ КЛАС: Величезні HTML-маркери для станцій */
        .html-station-marker {
            width: 40px; height: 40px; 
            background: rgba(255, 170, 0, 0.2); border: 2px solid #ffaa00;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer; box-shadow: 0 0 15px #ffaa00;
            transition: all 0.3s ease; position: relative;
            animation: pulse 2s infinite;
        }
        .html-station-marker:hover, .html-station-marker:active {
            background: rgba(255, 170, 0, 0.8); transform: scale(1.2);
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 170, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 170, 0, 0); }
        }
        
        /* Випадаюче меню для станцій */
        .html-station-popup {
            display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 15, 30, 0.95); border: 1px solid #ffaa00; border-radius: 8px;
            padding: 12px; color: #fff; font-family: 'Arial', sans-serif;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5); min-width: 200px;
            z-index: 10000; text-align: left;
        }
    </style>
</head>
<body>

    <div id="status-panel">⚙️ З'єднання з NORAD...</div>
    <button id="close-btn" onclick="if(window.Telegram && window.Telegram.WebApp){window.Telegram.WebApp.close();}else{window.close();}">✖ Вихід</button>

    <div id="mode-toggle">
        <button id="btn-all" class="mode-btn active" onclick="setFilter('all')">🌐 Всі об'єкти</button>
        <button id="btn-iss" class="mode-btn" onclick="setFilter('iss')">🌍 Станції</button>
        <button id="btn-starlink" class="mode-btn" onclick="setFilter('starlink')">📡 Starlink</button>
    </div>

    <div id="globeViz"></div>

    <script>
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) { window.Telegram.WebApp.expand(); }

        const EARTH_RADIUS_KM = 6371;
        const statusPanel = document.getElementById('status-panel');
        let satData = [];
        let currentFilter = 'all';

        function getSatInfo(name) {
            const upperName = name.toUpperCase();
            if (upperName.includes('ISS') || upperName.includes('ZARYA')) return { flag: '🌐', org: 'МКС', type: 'iss' };
            if (upperName.includes('TIANGONG') || upperName.includes('CSS')) return { flag: '🇨🇳', org: 'CNSA (Китай)', type: 'iss' };
            if (upperName.includes('STARLINK')) return { flag: '🇺🇸', org: 'SpaceX', type: 'starlink' };
            return { flag: '🛰️', org: 'Військові/Наукові', type: 'other' };
        }

        const orbitsData = [
            { id: "leo", name: "Низька орбіта (LEO)", altKm: 600, colorHex: "#00ffcc", colorVal: 0x00ffcc, angle: Math.PI / 2, desc: "Тут літає МКС та Starlink." },
            { id: "meo", name: "Середня орбіта (MEO)", altKm: 20000, colorHex: "#ffaa00", colorVal: 0xffaa00, angle: Math.PI / 3, desc: "Орбіта для навігаційних систем (GPS, Galileo)." },
            { id: "geo", name: "Геостаціонарна (GEO)", altKm: 35786, colorHex: "#ff00ff", colorVal: 0xff00ff, angle: Math.PI / 2, desc: "Супутники зв'язку, що зависають над однією точкою." }
        ];

        // --- ІНІЦІАЛІЗАЦІЯ ---
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('#00ffff')
            .atmosphereAltitude(0.15)
            // WebGL Точки (Тепер тільки для дрібних супутників)
            .pointColor(() => '#00ffcc')
            .pointAltitude('alt') 
            .pointRadius(0.035) 
            .pointResolution(16)
            .onPointHover(sat => { world.controls().autoRotate = !sat; })
            .pointLabel(sat => `
                <div class="scene-tooltip">
                    <div class="sat-name"><span>${sat.name}</span><span style="font-size: 20px;">${sat.info.flag}</span></div>
                    <div class="sat-org">${sat.info.org}</div>
                    <div class="sat-data">Висота: <span>${Math.round(sat.altKm)} км</span><br>Швидкість: <span>${Math.round(sat.velocity)} км/год</span></div>
                </div>
            `)
            // HTML Елементи (Гігантські кнопки для станцій)
            .htmlElement(d => {
                const el = document.createElement('div');
                el.className = 'html-station-marker';
                el.innerHTML = `
                    ${d.info.flag}
                    <div class="html-station-popup">
                        <div class="sat-name" style="color: #ffaa00;"><span>${d.name}</span></div>
                        <div class="sat-org">${d.info.org}</div>
                        <div class="sat-data">
                            Висота: <span>${Math.round(d.altKm)} км</span><br>
                            Швидкість: <span>${Math.round(d.velocity)} км/год</span><br>
                        </div>
                    </div>
                `;
                
                // Логіка кліку/тапу для телефону
                el.onclick = (e) => {
                    e.stopPropagation();
                    const popup = el.querySelector('.html-station-popup');
                    const isVisible = popup.style.display === 'block';
                    
                    // Закриваємо всі інші попапи
                    document.querySelectorAll('.html-station-popup').forEach(p => p.style.display = 'none');
                    
                    // Відкриваємо поточний
                    popup.style.display = isVisible ? 'none' : 'block';
                    
                    // Зупиняємо або запускаємо обертання планети
                    world.controls().autoRotate = isVisible;
                };
                return el;
            })
            // Орбіти
            .customLayerData(orbitsData)
            .customThreeObject(d => {
                const R = world.getGlobeRadius();
                const geo = new THREE.TorusGeometry(R * (1 + d.altKm/EARTH_RADIUS_KM), 0.8, 16, 100);
                const mat = new THREE.MeshBasicMaterial({color: d.colorVal, transparent: true, opacity: 0.35});
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = d.angle;
                return mesh;
            })
            .customLayerLabel(d => `
                <div class="scene-tooltip" style="border-color: ${d.colorHex} !important;">
                    <div class="sat-name" style="color: ${d.colorHex};">${d.name}</div>
                    <div class="sat-data">Середня висота: <span>~${d.altKm} км</span><br><div class="orbit-info">${d.desc}</div></div>
                </div>
            `)
            .onCustomLayerHover(obj => { world.controls().autoRotate = !obj; });

        world.camera().position.z = 350;
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        setTimeout(() => { scene.add(new THREE.AmbientLight(0xffffff, 0.9)); }, 500);

        // --- ПАРСИНГ ---
        async function loadSatellites() {
            try {
                const [stationsRes, starlinkRes] = await Promise.all([
                    fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle'),
                    fetch('https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle')
                ]);
                
                const stationsText = await stationsRes.text();
                const starlinkText = await starlinkRes.text();

                const starlinkLines = starlinkText.split('\n').slice(0, 900);
                const allLines = [...stationsText.split('\n'), ...starlinkLines].map(line => line.trim());
                
                for (let i = 0; i < allLines.length - 2; i += 3) {
                    const name = allLines[i];
                    const tle1 = allLines[i+1];
                    const tle2 = allLines[i+2];

                    if (name && tle1 && tle2 && tle1.startsWith('1 ') && tle2.startsWith('2 ')) {
                        try {
                            const satrec = satellite.twoline2satrec(tle1, tle2);
                            satData.push({ name: name, satrec: satrec, info: getSatInfo(name) });
                        } catch(e) {} 
                    }
                }

                statusPanel.innerHTML = `✅ Орбітальний радар: <b>${satData.length}</b> об'єктів`;
                updateSatellites();

            } catch (error) {
                statusPanel.innerHTML = "❌ Помилка з'єднання з NORAD.";
                statusPanel.style.color = "#ff4d4d";
            }
        }

        window.setFilter = function(filter) {
            currentFilter = filter;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + filter).classList.add('active');
            
            if(filter === 'iss') world.camera().position.z = 150;
            else world.camera().position.z = 350;
        };

        function updateSatellites() {
            const now = new Date();
            const gmst = satellite.gstime(now);
            
            // Розділяємо масиви для Гібридного рендерингу
            const webglSats = [];
            const htmlSats = [];

            satData.forEach(sat => {
                if (currentFilter !== 'all' && sat.info.type !== currentFilter) return;

                const positionAndVelocity = satellite.propagate(sat.satrec, now);
                const positionEci = positionAndVelocity.position;
                const velocityEci = positionAndVelocity.velocity;

                if (positionEci && velocityEci) {
                    const positionGd = satellite.eciToGeodetic(positionEci, gmst);
                    const altKm = positionGd.height;
                    const velocityKmS = Math.sqrt(Math.pow(velocityEci.x, 2) + Math.pow(velocityEci.y, 2) + Math.pow(velocityEci.z, 2));

                    const satObj = {
                        name: sat.name,
                        lat: satellite.degreesLat(positionGd.latitude),
                        lng: satellite.degreesLong(positionGd.longitude),
                        altKm: altKm,
                        alt: altKm / EARTH_RADIUS_KM, 
                        velocity: velocityKmS * 3600,
                        info: sat.info 
                    };

                    // Якщо це станція (МКС) - кидаємо в масив для HTML, інакше в WebGL
                    if (sat.info.type === 'iss') {
                        htmlSats.push(satObj);
                    } else {
                        webglSats.push(satObj);
                    }
                }
            });

            // Відправляємо дані у відповідні движки
            world.pointsData(webglSats);
            world.htmlElementsData(htmlSats);
            
            setTimeout(updateSatellites, 1000); 
        }

        // Закривати попапи станцій при кліку на порожнє місце глобуса
        document.getElementById('globeViz').addEventListener('click', () => {
            document.querySelectorAll('.html-station-popup').forEach(p => p.style.display = 'none');
            world.controls().autoRotate = true;
        });

        loadSatellites();
    </script>
</body>
</html>
