<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Орбітальний Радар (3D)</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif;}
        #globeViz { height: 100vh; width: 100vw; cursor: grab; }
        
        #close-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; background-color: rgba(30, 30, 30, 0.85); color: #ff4d4d; border: 2px solid #ff4d4d; padding: 10px 20px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        #status-panel { position: absolute; top: 15px; left: 15px; z-index: 9999; background-color: rgba(0, 0, 0, 0.8); color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 8px; font-size: 14px; font-family: monospace; font-weight: bold; pointer-events: none; }
        
        /* HTML Маркер для МКС */
        .iss-marker {
            color: #00ff00;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px #00ff00;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .iss-label { font-size: 12px; margin-top: 5px; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; border: 1px solid #00ff00;}
    </style>
</head>
<body>

    <div id="status-panel">⚙️ Підключення до систем NORAD...</div>
    <button id="close-btn" onclick="if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData){window.Telegram.WebApp.close();}else{window.close();}">✖ Закрити</button>

    <div id="globeViz"></div>

    <script>
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) { 
            window.Telegram.WebApp.expand(); 
        }

        const statusPanel = document.getElementById('status-panel');

        // Ініціалізація 3D Глобуса
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg') // Нічна текстура Землі
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png') // Рельєф гір
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png') // Зірки на фоні
            .showAtmosphere(true)
            .atmosphereColor('#00aaff')
            .atmosphereAltitude(0.15);

        // Налаштування камери (трохи віддаляємо, щоб бачити планету)
        world.camera().position.z = 300;

        // Функція для отримання координат МКС
        async function fetchISS() {
            try {
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                if (!response.ok) throw new Error("API Error");
                
                const data = await response.json();
                
                const lat = data.latitude;
                const lon = data.longitude;
                const alt = Math.round(data.altitude); // км
                const speed = Math.round(data.velocity); // км/год

                statusPanel.innerHTML = `🛰️ <b>МКС (Zarya)</b><br>Висота: ${alt} км<br>Швидкість: ${speed} км/год`;

                // Оновлюємо маркер на глобусі
                world.htmlElementsData([{
                    lat: lat,
                    lng: lon,
                    name: 'МКС'
                }])
                .htmlElement(d => {
                    const el = document.createElement('div');
                    el.className = 'iss-marker';
                    el.innerHTML = `🛰️<div class="iss-label">${speed} км/год</div>`;
                    return el;
                });

                // Плавно обертаємо камеру за МКС
                world.pointOfView({ lat: lat, lng: lon, altitude: 2 }, 1000);

            } catch (error) {
                console.error(error);
                statusPanel.innerHTML = "❌ Втрачено сигнал із супутником.";
                statusPanel.style.color = "#ff4d4d";
                statusPanel.style.borderColor = "#ff4d4d";
            }
        }

        // Запуск
        fetchISS();
        // Оновлюємо кожні 3 секунди (МКС летить дуже швидко!)
        setInterval(fetchISS, 3000);

        // Автоматичне обертання планети, якщо юзер не крутить її сам
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;
    </script>
</body>
</html>
