
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Орбітальний Радар (NORAD)</title>
    
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace;}
        #globeViz { height: 100vh; width: 100vw; cursor: grab; }
        
        #close-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; background: rgba(0, 0, 0, 0.8); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status-panel { position: absolute; top: 15px; left: 15px; z-index: 9999; background: rgba(0, 20, 40, 0.8); color: #00ffcc; border: 1px solid #00ffcc; padding: 10px; border-radius: 5px; font-size: 14px; font-weight: bold; pointer-events: none; text-shadow: 0 0 5px #00ffcc; }
        
        /* Дизайн спливаючого вікна при наведенні на супутник */
        .scene-tooltip {
            background: rgba(0, 15, 30, 0.9) !important;
            border: 1px solid #00ffcc !important;
            border-radius: 8px !important;
            padding: 10px !important;
            color: #fff !important;
            font-family: 'Arial', sans-serif !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4) !important;
            pointer-events: none;
        }
        .sat-name { color: #00ffcc; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 5px;}
        .sat-data { font-size: 13px; color: #ccc; }
        .sat-data span { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-panel">⚙️ Завантаження TLE даних (NORAD)...</div>
    <button id="close-btn" onclick="if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData){window.Telegram.WebApp.close();}else{window.close();}">✖ На базу</button>

    <div id="globeViz"></div>

    <script>
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) { 
            window.Telegram.WebApp.expand(); 
        }

        const EARTH_RADIUS_KM = 6371; // Радіус Землі для розрахунків висоти
        const statusPanel = document.getElementById('status-panel');
        let satData = [];

        // 1. ІНІЦІАЛІЗАЦІЯ КІБЕР-ГЛОБУСА
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg') // Нічна урбанізація
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png') // Зірки
            .showAtmosphere(true)
            .atmosphereColor('#00ffcc') // Кіберпанк-неон
            .atmosphereAltitude(0.15)
            .pointColor(() => '#00ffcc') // Колір точок (супутників)
            .pointAltitude('alt') // Змінна висоти
            .pointRadius(0.03) // Розмір точки
            .pointResolution(16)
            // Форматування спливаючого вікна при наведенні
            .onPointHover(sat => {
                const tooltip = document.querySelector('.scene-tooltip');
                if (sat) {
                    world.controls().autoRotate = false; // Зупиняємо обертання, щоб зручно читати
                } else {
                    world.controls().autoRotate = true;
                }
            })
            .pointLabel(sat => `
                <div class="sat-name">🛰️ ${sat.name}</div>
                <div class="sat-data">
                    Висота: <span>${Math.round(sat.altKm)} км</span><br>
                    Швидкість: <span>${Math.round(sat.velocity)} км/год</span><br>
                    Орбіта: <span>${sat.altKm < 2000 ? 'LEO (Низька)' : 'MEO/GEO (Висока)'}</span>
                </div>
            `);

        // Віддаляємо камеру
        world.camera().position.z = 350;
        world.controls().autoRotate = true;
        world.controls().autoRotateSpeed = 0.5;

        // 2. СТВОРЕННЯ ОРБІТАЛЬНИХ КІЛЕЦЬ (ГРАФІКА)
        setTimeout(() => {
            const scene = world.scene();
            
            // Кільце LEO (Низька орбіта - ~1000 км)
            const leoAlt = 1000 / EARTH_RADIUS_KM;
            const leoGeo = new THREE.TorusGeometry(world.getGlobeRadius() * (1 + leoAlt), 0.5, 16, 100);
            const leoMat = new THREE.MeshBasicMaterial({color: 0x00ffcc, transparent: true, opacity: 0.1});
            const leoRing = new THREE.Mesh(leoGeo, leoMat);
            leoRing.rotation.x = Math.PI / 2;
            scene.add(leoRing);

            // Кільце MEO (Середня орбіта - Навігація GPS/ГЛОНАСС - ~20000 км)
            const meoAlt = 20000 / EARTH_RADIUS_KM;
            const meoGeo = new THREE.TorusGeometry(world.getGlobeRadius() * (1 + meoAlt), 0.5, 16, 100);
            const meoMat = new THREE.MeshBasicMaterial({color: 0xff00ff, transparent: true, opacity: 0.1});
            const meoRing = new THREE.Mesh(meoGeo, meoMat);
            meoRing.rotation.x = Math.PI / 3; // Під кутом
            scene.add(meoRing);
        }, 1000);

        // 3. ПАРСИНГ ТА ФІЗИКА СУПУТНИКІВ
        async function loadSatellites() {
            try {
                // Беремо список "100 найяскравіших супутників" + "Космічні станції" від CelesTrak
                // (Щоб браузер не завис від 8000 об'єктів одночасно)
                const targetUrl = 'https://celestrak.org/NORAD/elements/gp.php?GROUP=visual&FORMAT=tle';
                const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl));
                const tleData = await response.text();

                // Розбиваємо текст на рядки
                const tleLines = tleData.split('\n').map(line => line.trim());
                
                // Кожен супутник займає 3 рядки: Назва, Рядок 1, Рядок 2
                for (let i = 0; i < tleLines.length - 2; i += 3) {
                    const name = tleLines[i];
                    const tle1 = tleLines[i+1];
                    const tle2 = tleLines[i+2];

                    if (name && tle1 && tle2) {
                        try {
                            const satrec = satellite.twoline2satrec(tle1, tle2);
                            satData.push({ name: name, satrec: satrec });
                        } catch(e) {} // Ігноруємо биті дані
                    }
                }

                statusPanel.innerHTML = `✅ Орбітальний радар: <b>${satData.length}</b> об'єктів`;
                
                // Запускаємо двигун оновлення координат
                updateSatellites();

            } catch (error) {
                statusPanel.innerHTML = "❌ Помилка завантаження TLE баз.";
                statusPanel.style.color = "#ff4d4d";
            }
        }

        // 4. ОНОВЛЕННЯ КООРДИНАТ В РЕАЛЬНОМУ ЧАСІ
        function updateSatellites() {
            const now = new Date();
            const gmst = satellite.gstime(now); // Зоряний час
            const visibleSats = [];

            satData.forEach(sat => {
                // Прогнозуємо позицію на поточну мілісекунду
                const positionAndVelocity = satellite.propagate(sat.satrec, now);
                const positionEci = positionAndVelocity.position;
                const velocityEci = positionAndVelocity.velocity;

                if (positionEci && velocityEci) {
                    // Конвертуємо космічні координати в земні (широта, довгота, висота)
                    const positionGd = satellite.eciToGeodetic(positionEci, gmst);
                    
                    const longitude = satellite.degreesLong(positionGd.longitude);
                    const latitude = satellite.degreesLat(positionGd.latitude);
                    const altKm = positionGd.height;
                    
                    // Швидкість = корінь з суми квадратів векторів
                    const velocityKmS = Math.sqrt(
                        Math.pow(velocityEci.x, 2) + 
                        Math.pow(velocityEci.y, 2) + 
                        Math.pow(velocityEci.z, 2)
                    );

                    // Передаємо в Globe.gl (висота тут - це відношення до радіуса Землі)
                    visibleSats.push({
                        name: sat.name,
                        lat: latitude,
                        lng: longitude,
                        altKm: altKm,
                        alt: altKm / EARTH_RADIUS_KM, // Globe.gl вимагає відносну висоту
                        velocity: velocityKmS * 3600 // км/с -> км/год
                    });
                }
            });

            // Відправляємо масив точок на відеокарту
            world.pointsData(visibleSats);

            // Оновлюємо кожну секунду (WebGL малює це миттєво без гальм)
            setTimeout(updateSatellites, 1000);
        }

        loadSatellites();
    </script>
</body>
</html>
