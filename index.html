
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Глобальний Радар</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif;}
        #map { height: 100vh; width: 100vw; }
        
        .plane-icon {
            font-size: 20px; text-align: center; line-height: 20px;
            transform-origin: center center; 
        }
        
        .leaflet-popup-content { font-size: 14px; }
        
        .fr-btn {
            display: inline-block; margin-top: 10px; padding: 5px 10px;
            background: #0088cc; color: white; text-decoration: none;
            border-radius: 5px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box;
        }

       
        #close-btn {
            position: absolute; top: 15px; right: 15px; z-index: 9999;
            background-color: rgba(30, 30, 30, 0.85); color: #ff4d4d;
            border: 2px solid #ff4d4d; padding: 10px 20px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
        }

       
        #status-panel {
            position: absolute; top: 15px; left: 15px; z-index: 9999;
            background-color: rgba(0, 0, 0, 0.8); color: #00ff00;
            border: 1px solid #00ff00; padding: 10px; border-radius: 8px;
            font-size: 14px; font-family: monospace; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status-panel">⚙️ Ініціалізація системи...</div>
    <button id="close-btn" onclick="tg.close()">✖ Закрити</button>

    <div id="map"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const map = L.map('map').setView([49.0, 31.0], 5); 

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        const markersGroup = L.markerClusterGroup({
            disableClusteringAtZoom: 8,
            maxClusterRadius: 50
        });
        map.addLayer(markersGroup);

        const statusPanel = document.getElementById('status-panel');

        async function fetchPlanes() {
            statusPanel.innerHTML = "📡 Отримання даних з супутника...";
            statusPanel.style.color = "#ffff00"; 
            statusPanel.style.borderColor = "#ffff00";

            try {
              
               const targetUrl = encodeURIComponent('https://opensky-network.org/api/states/all?lamin=35.0&lomin=-10.0&lamax=70.0&lomax=45.0');
               const response = await fetch('https://api.allorigins.win/raw?url=' + targetUrl);
                // Якщо зловили бан (429 помилка)
                if (response.status === 429) {
                    statusPanel.innerHTML = "❌ Помилка 429: API ліміт вичерпано. Спробуйте через годину.";
                    statusPanel.style.color = "#ff4d4d";
                    statusPanel.style.borderColor = "#ff4d4d";
                    return;
                }

                if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

                const data = await response.json();

                if (!data || !data.states) {
                    statusPanel.innerHTML = "⚠️ У заданому квадраті літаків не знайдено.";
                    statusPanel.style.color = "#ff9900";
                    return;
                }

                markersGroup.clearLayers();
                const newMarkers = [];

                data.states.forEach(plane => {
                    const callsign = plane[1] ? plane[1].trim() : "N/A";
                    const country = plane[2] || "Невідомо";
                    const lon = plane[5];
                    const lat = plane[6];
                    const velocity = plane[9];
                    const true_track = plane[10] || 0;
                    const altitude = plane[13];

                    if (lat === null || lon === null) return;

                    const planeHtmlIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="plane-icon" style="transform: rotate(${true_track}deg);">✈️</div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    const speedKmh = velocity ? Math.round(velocity * 3.6) : 0;
                    
                    const popupText = `
                        <b>Позивний:</b> ${callsign}<br>
                        <b>Реєстрація:</b> ${country}<br>
                        <b>Висота:</b> ${altitude ? Math.round(altitude) + ' м' : 'На землі'}<br>
                        <b>Швидкість:</b> ${speedKmh} км/год<br>
                        <hr style="margin: 5px 0;">
                        <a href="https://www.flightradar24.com/${callsign}" target="_blank" class="fr-btn">🔍 Модель та Маршрут</a>
                    `;

                    const marker = L.marker([lat, lon], { icon: planeHtmlIcon }).bindPopup(popupText);
                    newMarkers.push(marker);
                });

                markersGroup.addLayers(newMarkers);
                
                // Успішний статус
                statusPanel.innerHTML = `✅ Радар активний. Знайдено бортів: ${newMarkers.length}`;
                statusPanel.style.color = "#00ff00";
                statusPanel.style.borderColor = "#00ff00";

            } catch (error) {
                console.error(error);
                statusPanel.innerHTML = "❌ Втрачено зв'язок із сервером API.";
                statusPanel.style.color = "#ff4d4d";
                statusPanel.style.borderColor = "#ff4d4d";
            }
        }

        fetchPlanes();
        
        setInterval(fetchPlanes, 60000); 
    </script>
</body>
</html>
