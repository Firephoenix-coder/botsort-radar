
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Глобальний Радар (FlightRadar24 JSONP)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif;}
        #map { height: 100vh; width: 100vw; }
        
        .plane-icon {
            font-size: 20px; text-align: center; line-height: 20px;
            transform-origin: center center; 
        }
        
        .leaflet-popup-content { font-size: 14px; }
        
        .fr-btn {
            display: inline-block; margin-top: 10px; padding: 5px 10px;
            background: #ff9900; color: #000; text-decoration: none;
            border-radius: 5px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box;
        }

        #close-btn {
            position: absolute; top: 15px; right: 15px; z-index: 9999;
            background-color: rgba(30, 30, 30, 0.85); color: #ff4d4d;
            border: 2px solid #ff4d4d; padding: 10px 20px; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px);
        }

        #status-panel {
            position: absolute; top: 15px; left: 15px; z-index: 9999;
            background-color: rgba(0, 0, 0, 0.8); color: #00ff00;
            border: 1px solid #00ff00; padding: 10px; border-radius: 8px;
            font-size: 14px; font-family: monospace; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="status-panel">⚙️ Ініціалізація...</div>
    <button id="close-btn" onclick="tg.close()">✖ Закрити</button>

    <div id="map"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const map = L.map('map').setView([49.0, 31.0], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap © CARTO © FlightRadar24'
        }).addTo(map);

        const markersGroup = L.markerClusterGroup({
            disableClusteringAtZoom: 8,
            maxClusterRadius: 50
        });
        map.addLayer(markersGroup);

        const statusPanel = document.getElementById('status-panel');
        let timeoutId;

        // ГЛОБАЛЬНА ФУНКЦІЯ: Її викличе сам FlightRadar24 після завантаження скрипта
        window.processFR24Data = function(data) {
            clearTimeout(timeoutId); // Дані прийшли успішно, скасовуємо таймер помилки

            markersGroup.clearLayers();
            const newMarkers = [];
            let count = 0;

            for (let key in data) {
                if (key === 'full_count' || key === 'version' || key === 'stats') continue;
                
                const plane = data[key];
                const lat = plane[1];
                const lon = plane[2];
                const track = plane[3];
                const altFeet = plane[4];
                const speedKnots = plane[5];
                const model = plane[8] || "Невідома модель";
                const reg = plane[9] || "N/A";
                const from = plane[11] || "—";
                const to = plane[12] || "—";
                const flightNum = plane[13] || "Приватний/N/A";

                if (lat == null || lon == null) continue;

                const altMeters = Math.round(altFeet * 0.3048);
                const speedKmh = Math.round(speedKnots * 1.852);

                const planeHtmlIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="plane-icon" style="transform: rotate(${track}deg);">✈️</div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });

                const popupText = `
                    <b>Рейс:</b> ${flightNum} (${reg})<br>
                    <b>Модель:</b> ${model}<br>
                    <b>Маршрут:</b> ${from} ➡️ ${to}<br>
                    <b>Висота:</b> ${altMeters} м<br>
                    <b>Швидкість:</b> ${speedKmh} км/год<br>
                    <hr style="margin: 5px 0;">
                    <a href="https://www.flightradar24.com/${key}" target="_blank" class="fr-btn">🗺 Відкрити на FlightRadar</a>
                `;

                const marker = L.marker([lat, lon], { icon: planeHtmlIcon }).bindPopup(popupText);
                newMarkers.push(marker);
                count++;
            }

            markersGroup.addLayers(newMarkers);
            
            statusPanel.innerHTML = `✅ FlightRadar активний. Бортів: ${count}`;
            statusPanel.style.color = "#00ff00";
            statusPanel.style.borderColor = "#00ff00";
        };

      async function fetchPlanes() {
            statusPanel.innerHTML = "📡 Обхід CORS через проксі...";
            statusPanel.style.color = "#ff0"; statusPanel.style.borderColor = "#ff0";

            try {
                // Цільова адреса OpenSky (Європа/Україна)
                const targetUrl = 'https://opensky-network.org/api/states/all?lamin=40.0&lomin=15.0&lamax=60.0&lomax=45.0';
                
                // Пропускаємо через AllOrigins, щоб убити захист CORS
                const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(targetUrl);
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`Помилка проксі: ${response.status}`);

                const proxyData = await response.json();
                
                // Перевіряємо, чи не зловив сам проксі 429 помилку від OpenSky
                if (proxyData.status && proxyData.status.http_code === 429) {
                    statusPanel.innerHTML = "❌ Бан по IP (429). OpenSky заблокував проксі.";
                    statusPanel.style.color = "#f44"; statusPanel.style.borderColor = "#f44";
                    return;
                }

                // Розпаковуємо сирий текст від OpenSky назад у JSON
                const data = JSON.parse(proxyData.contents);
                if (!data || !data.states) throw new Error("Немає даних про літаки");

                markersGroup.clearLayers();
                const newMarkers = [];

                data.states.forEach(plane => {
                    if (plane[6] === null || plane[5] === null) return;

                    const callsign = plane[1] ? plane[1].trim() : "N/A";
                    const true_track = plane[10] || 0;
                    
                    const planeHtmlIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="plane-icon" style="transform: rotate(${true_track}deg);">✈️</div>`,
                        iconSize: [20, 20], iconAnchor: [10, 10]
                    });

                    const speedKmh = plane[9] ? Math.round(plane[9] * 3.6) : 0;
                    const altMeters = plane[13] ? Math.round(plane[13]) + ' м' : 'На землі';

                    const popupText = `
                        <b>Позивний:</b> ${callsign}<br>
                        <b>Висота:</b> ${altMeters}<br>
                        <b>Швидкість:</b> ${speedKmh} км/год<br>
                        <hr style="margin: 5px 0;">
                        <a href="https://www.flightradar24.com/${callsign}" target="_blank" class="fr-btn">Деталі рейсу (FR24)</a>
                    `;

                    newMarkers.push(L.marker([plane[6], plane[5]], { icon: planeHtmlIcon }).bindPopup(popupText));
                });

                markersGroup.addLayers(newMarkers);
                statusPanel.innerHTML = `✅ Радар активний. Бортів: ${newMarkers.length}`;
                statusPanel.style.color = "#0f0"; statusPanel.style.borderColor = "#0f0";

            } catch (error) {
                statusPanel.innerHTML = `❌ Помилка: ${error.message}`;
                statusPanel.style.color = "#f44"; statusPanel.style.borderColor = "#f44";
                console.error("Деталі помилки:", error);
            }
        }

        // Запуск
        fetchPlanes();
        // Інтервал 15 секунд — ідеально для плавного оновлення
        setInterval(fetchPlanes, 15000); 
    </script>
</body>
</html>
