<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Глобальний Радар (Літаки + Кораблі)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; font-family: Arial, sans-serif;}
        #map { height: 100vh; width: 100vw; }
        
        .icon-container { font-size: 20px; text-align: center; line-height: 20px; transform-origin: center center; }
        .leaflet-popup-content { font-size: 14px; }
        
        .fr-btn { display: inline-block; margin-top: 10px; padding: 5px 10px; border-radius: 5px; font-weight: bold; width: 100%; text-align: center; box-sizing: border-box; text-decoration: none; color: white;}
        .btn-plane { background: #ff9900; color: #000; }
        .btn-ship { background: #0088cc; }

        /* Системні панелі */
        #close-btn { position: absolute; top: 15px; right: 15px; z-index: 9999; background-color: rgba(30, 30, 30, 0.85); color: #ff4d4d; border: 2px solid #ff4d4d; padding: 10px 20px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        #status-panel { position: absolute; top: 15px; left: 15px; z-index: 9999; background-color: rgba(0, 0, 0, 0.8); color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 8px; font-size: 14px; font-family: monospace; font-weight: bold; }
        
        /* Панель перемикання режимів */
        #mode-toggle { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 15px; backdrop-filter: blur(5px); border: 1px solid #555; }
        .mode-btn { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background: #333; color: white; transition: 0.3s; }
        .mode-btn.active { background: #00ff00; color: black; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <div id="status-panel">⚙️ Ініціалізація...</div>
    <button id="close-btn" onclick="if(window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData){window.Telegram.WebApp.close();}else{window.close();}">✖ Закрити</button>

    <div id="mode-toggle">
        <button id="btn-planes" class="mode-btn active" onclick="switchMode('planes')">✈️ Літаки</button>
        <button id="btn-ships" class="mode-btn" onclick="switchMode('ships')">🚢 Кораблі</button>
    </div>

    <div id="map"></div>

    <script>
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) { window.Telegram.WebApp.expand(); }

        const map = L.map('map').setView([49.0, 31.0], 4);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        const markersGroup = L.markerClusterGroup({ disableClusteringAtZoom: 8, maxClusterRadius: 50 });
        map.addLayer(markersGroup);

        const statusPanel = document.getElementById('status-panel');
        let currentMode = 'planes';
        let updateIntervalId;
        let timeoutId;

        // ==========================
        // ЛОГІКА ДЛЯ ЛІТАКІВ (FlightRadar24)
        // ==========================
        window.processFR24Data = function(data) {
            if(currentMode !== 'planes') return; // Блокуємо відмальовку, якщо перемкнули режим
            clearTimeout(timeoutId); 

            markersGroup.clearLayers();
            const newMarkers = [];
            let count = 0;

            for (let key in data) {
                if (key === 'full_count' || key === 'version' || key === 'stats') continue;
                
                const plane = data[key];
                const lat = plane[1]; const lon = plane[2]; const track = plane[3];
                const altMeters = Math.round((plane[4] || 0) * 0.3048);
                const speedKmh = Math.round((plane[5] || 0) * 1.852);
                const flightNum = plane[13] || "Приватний";

                if (lat == null || lon == null) continue;

                const icon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div class="icon-container" style="transform: rotate(${track}deg);">✈️</div>`,
                    iconSize: [20, 20], iconAnchor: [10, 10]
                });

                const popupText = `
                    <b>Рейс:</b> ${flightNum}<br>
                    <b>Висота:</b> ${altMeters} м<br>
                    <b>Швидкість:</b> ${speedKmh} км/год<br>
                    <hr style="margin: 5px 0;">
                    <a href="https://www.flightradar24.com/${key}" target="_blank" class="fr-btn btn-plane">🗺 На FlightRadar24</a>
                `;

                newMarkers.push(L.marker([lat, lon], { icon: icon }).bindPopup(popupText));
                count++;
            }

            markersGroup.addLayers(newMarkers);
            statusPanel.innerHTML = `✅ Літаків у повітрі: ${count}`;
            statusPanel.style.color = "#00ff00"; statusPanel.style.borderColor = "#00ff00";
        };

        function fetchPlanes() {
            if(currentMode !== 'planes') return;
            statusPanel.innerHTML = "📡 З'єднання з FlightRadar24...";
            statusPanel.style.color = "#ffff00"; statusPanel.style.borderColor = "#ffff00";

            const script = document.createElement('script');
            script.id = 'fr24-script';
            script.src = 'https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=90.0,-90.0,-180.0,180.0&faa=1&mlat=1&flarm=1&adsb=1&gnd=1&air=1&vehicles=0&estimated=1&maxage=14400&gliders=0&stats=0&callback=processFR24Data';
            
            const oldScript = document.getElementById('fr24-script');
            if (oldScript) oldScript.remove();
            document.body.appendChild(script);

            timeoutId = setTimeout(() => {
                if(currentMode === 'planes') {
                    statusPanel.innerHTML = "❌ Втрачено зв'язок з FR24.";
                    statusPanel.style.color = "#ff4d4d"; statusPanel.style.borderColor = "#ff4d4d";
                }
            }, 10000);
        }

        // ==========================
        // ЛОГІКА ДЛЯ КОРАБЛІВ (Digitraffic AIS)
        // ==========================
        async function fetchShips() {
            if(currentMode !== 'ships') return;
            statusPanel.innerHTML = "📡 Підключення до морських радарів (AIS)...";
            statusPanel.style.color = "#ffff00"; statusPanel.style.borderColor = "#ffff00";

            try {
                // Відкритий урядовий API (CORS дозволено нативно)
                const response = await fetch('https://meri.digitraffic.fi/api/ais/v1/locations');
                if (!response.ok) throw new Error("Помилка з'єднання");
                
                const data = await response.json();
                
                if(currentMode !== 'ships') return; // Якщо користувач перемкнув вкладку, поки йшов запит
                markersGroup.clearLayers();
                
                const newMarkers = [];
                let count = 0;

                data.features.forEach(ship => {
                    const coords = ship.geometry.coordinates;
                    const props = ship.properties;
                    if (!coords || coords.length < 2) return;

                    const lon = coords[0];
                    const lat = coords[1];
                    const mmsi = props.mmsi; // Унікальний номер судна
                    const heading = props.heading || props.cog || 0;
                    const speedKmh = props.sog ? Math.round(props.sog * 1.852) : 0; // Вузли у км/год

                    const icon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="icon-container" style="transform: rotate(${heading}deg);">🚢</div>`,
                        iconSize: [20, 20], iconAnchor: [10, 10]
                    });

                    // Кнопка буде шукати корабель на MarineTraffic за його унікальним MMSI ID
                    const popupText = `
                        <b>ID Судна (MMSI):</b> ${mmsi}<br>
                        <b>Курс:</b> ${heading}°<br>
                        <b>Швидкість:</b> ${speedKmh} км/год<br>
                        <hr style="margin: 5px 0;">
                        <a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:${mmsi}" target="_blank" class="fr-btn btn-ship">🗺 Знайти на MarineTraffic</a>
                    `;

                    newMarkers.push(L.marker([lat, lon], { icon: icon }).bindPopup(popupText));
                    count++;
                });

                markersGroup.addLayers(newMarkers);
                statusPanel.innerHTML = `✅ Кораблів на радарі: ${count}`;
                statusPanel.style.color = "#00ff00"; statusPanel.style.borderColor = "#00ff00";

            } catch (error) {
                console.error("Помилка AIS:", error);
                statusPanel.innerHTML = "❌ Втрачено зв'язок з AIS радарами.";
                statusPanel.style.color = "#ff4d4d"; statusPanel.style.borderColor = "#ff4d4d";
            }
        }

        // ==========================
        // ПЕРЕМИКАЧ РЕЖИМІВ
        // ==========================
        window.switchMode = function(mode) {
            currentMode = mode;
            clearInterval(updateIntervalId);
            clearTimeout(timeoutId);
            markersGroup.clearLayers();

            // Оновлюємо стилі кнопок
            document.getElementById('btn-planes').classList.toggle('active', mode === 'planes');
            document.getElementById('btn-ships').classList.toggle('active', mode === 'ships');

            if (mode === 'planes') {
                map.flyTo([49.0, 31.0], 4, { duration: 1.5 }); // Летимо в центр Європи
                fetchPlanes();
                updateIntervalId = setInterval(fetchPlanes, 15000); // Літаки швидкі
            } else {
                map.flyTo([59.0, 22.0], 5, { duration: 1.5 }); // Летимо на Балтійське море (зона дії радара)
                fetchShips();
                updateIntervalId = setInterval(fetchShips, 30000); // Кораблі повільні, оновлюємо рідше
            }
        };

        // Запуск системи
        switchMode('planes');
    </script>
</body>
</html>
