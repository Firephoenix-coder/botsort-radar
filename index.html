<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Глобальний Радар</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        #map { height: 100vh; width: 100vw; }
        
        .plane-icon {
            font-size: 20px;
            text-align: center;
            line-height: 20px;
            transform-origin: center center; 
        }
        
        .leaflet-popup-content { font-family: Arial, sans-serif; font-size: 14px; }
        
        .fr-btn {
            display: inline-block; margin-top: 10px; padding: 5px 10px;
            background: #0088cc; color: white; text-decoration: none;
            border-radius: 5px; font-weight: bold;
        }

        
        #close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 9999; /* Поверх усіх шарів карти */
            background-color: rgba(30, 30, 30, 0.85);
            color: #ff4d4d;
            border: 2px solid #ff4d4d;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }
        #close-btn:hover { background-color: #ff4d4d; color: white; }
    </style>
</head>
<body>

    <button id="close-btn" onclick="closeRadar()">✖ Закрити Радар</button>

    <div id="map"></div>

    <script>
        const tg = window.Telegram.WebApp;
        
       
        tg.expand(); 

       
        function closeRadar() {
            tg.close();
        }

        const map = L.map('map').setView([50.4501, 30.5234], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        const markersGroup = L.markerClusterGroup({
            disableClusteringAtZoom: 8,
            maxClusterRadius: 50
        });
        map.addLayer(markersGroup);

        async function fetchPlanes() {
            try {
                const response = await fetch('https://corsproxy.io/?https://opensky-network.org/api/states/all?lamin=35.0&lomin=-10.0&lamax=70.0&lomax=45.0');
                const data = await response.json();

                if (!data || !data.states) return;
                markersGroup.clearLayers();
                const newMarkers = [];

                data.states.forEach(plane => {
                    const callsign = plane[1] ? plane[1].trim() : "N/A";
                    const country = plane[2] || "Невідомо";
                    const lon = plane[5];
                    const lat = plane[6];
                    const velocity = plane[9];
                    const true_track = plane[10] || 0;
                    const altitude = plane[13];

                    if (lat === null || lon === null) return;

                    const planeHtmlIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div class="plane-icon" style="transform: rotate(${true_track}deg);">✈️</div>`,
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });

                    const speedKmh = velocity ? Math.round(velocity * 3.6) : 0;
                    
                    const popupText = `
                        <b>Позивний:</b> ${callsign}<br>
                        <b>Реєстрація:</b> ${country}<br>
                        <b>Висота:</b> ${altitude ? Math.round(altitude) + ' м' : 'На землі'}<br>
                        <b>Швидкість:</b> ${speedKmh} км/год<br>
                        <hr style="margin: 5px 0;">
                        <a href="https://www.flightradar24.com/${callsign}" target="_blank" class="fr-btn">🔍 Знайти на FlightRadar</a>
                    `;

                    const marker = L.marker([lat, lon], { icon: planeHtmlIcon }).bindPopup(popupText);
                    newMarkers.push(marker);
                });

                markersGroup.addLayers(newMarkers);
            } catch (error) {
                console.error("Помилка радара:", error);
            }
        }

        fetchPlanes();
        setInterval(fetchPlanes, 15000);
    </script>
</body>
</html>
